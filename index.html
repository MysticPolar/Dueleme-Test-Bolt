<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="读了么 · 猫头鹰邮局每日神谕特刊" />

  <title>读了么</title>

  <!-- Favicon inline SVG via data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1208'/%3E%3Ctext x='4' y='26' font-size='24' fill='%23f5efe0'%3E读%3C/text%3E%3C/svg%3E" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1208;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 16px;
      transition: opacity 0.4s ease;
    }

    #loading .logo {
      font-size: 48px;
      color: #f5efe0;
      letter-spacing: 4px;
    }

    #loading .logo span { color: #c0392b; }

    #loading .tagline {
      font-size: 10px;
      letter-spacing: 4px;
      color: #54493a;
      text-transform: uppercase;
    }

    #loading .rule {
      width: 120px;
      height: 1px;
      background: rgba(245,239,224,0.15);
    }

    #loading .test-entry {
      margin-top: 18px;
      padding: 8px 18px;
      border: 1px solid rgba(245,239,224,0.35);
      background: transparent;
      color: #f5efe0;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    #loading .test-entry:hover {
      background: rgba(245,239,224,0.12);
      border-color: rgba(245,239,224,0.6);
    }

    #loading .status {
      min-height: 14px;
      margin-top: 8px;
      color: #54493a;
      font-size: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Loading splash -->
  <div id="loading">
    <div class="rule"></div>
    <div class="logo">读<span>了</span>么</div>
    <div class="tagline">大胆去读</div>
    <div class="rule"></div>
    <button id="test-entry" class="test-entry" type="button">测试入口</button>
    <div id="loading-status" class="status"></div>
  </div>

  <div id="root"></div>

  <!-- Font CDN preconnect (China-accessible mirror) -->
  <link rel="preconnect" href="https://fonts.loli.net" />
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin />

  <!-- Main app entry (Vite) -->
  <script type="module" src="/src/main.jsx"></script>

  <script>
    let testEntryRequested = false;

    const hideLoading = () => {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.opacity = "0";
        setTimeout(() => loading.remove(), 500);
      }
    };

    const testEntry = document.getElementById("test-entry");
    if (testEntry) {
      testEntry.addEventListener("click", () => {
        testEntryRequested = true;
        sessionStorage.setItem("duleme-force-home", "1");
        window.dispatchEvent(new CustomEvent("duleme-force-home"));
        testEntry.disabled = true;
        testEntry.style.opacity = "0.6";
        testEntry.style.cursor = "default";

        const status = document.getElementById("loading-status");
        if (status) status.textContent = "正在进入主页面...";

        // If React has already rendered, enter immediately.
        const root = document.getElementById("root");
        if (root && root.childElementCount > 0) {
          hideLoading();
        }
      });
    }

    // Hide loading screen once React mounts
    window.__dulemeReady = function() {
      hideLoading();
    };

    // Safety fallback: if test entry was clicked but app is still not ready,
    // keep splash visible and show a hint instead of a blank screen.
    setTimeout(() => {
      if (!testEntryRequested) return;
      const loading = document.getElementById("loading");
      const root = document.getElementById("root");
      if (loading && root && root.childElementCount === 0) {
        const status = document.getElementById("loading-status");
        if (status) status.textContent = "主页面仍在加载，请稍候...";
      }
    }, 3000);
  </script>

</body>
</html>
