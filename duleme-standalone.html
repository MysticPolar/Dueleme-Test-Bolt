const QuestionCard = ({ q, index, onClick }) => {
  const isOdd = index % 2 === 0;
  const rot = isOdd ? -1.5 : 1;
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onClick={() => onClick(q)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        flexShrink:0, width:182, padding:"12px 13px 10px",
        border:`1.5px solid ${C.rule}`, position:"relative", overflow:"hidden",
        cursor:"pointer", ...TEX.paperLight,
        transform: hovered ? "rotate(0deg) translateY(-4px)" : `rotate(${rot}deg)`,
        marginTop: isOdd ? 0 : 10,
        boxShadow: hovered ? `4px 6px 0 ${C.ink}` : "none",
        animation:`${isOdd?"f-in":"f-in2"} 0.5s ease ${0.08+index*0.12}s both`,
        transition:"transform 0.2s ease, box-shadow 0.2s ease",
        "--rot":`${rot}deg`,
      }}
    >
      <div style={{ position:"absolute", top:0, left:0, right:0, height:4, background:CARD_C[q.color]||C.coral }}/>
      <div style={{ fontFamily:F.ui, fontSize:7, fontWeight:700, letterSpacing:2.5, textTransform:"uppercase", color:C.muted, marginBottom:7 }}>{q.tag}</div>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>

      </div>
    </div>

};

];

const InputBar = ({ onSend }) => {
  const [mode, setMode] = useState("normal");
  const [text, setText] = useState("");
  const [rec, setRec] = useState(false);
  const m = MODES.find(x => x.id === mode);

  const send = () => { if (text.trim()) { onSend(text.trim(), mode); setText(""); } };

  return (
    <div style={{ ...TEX.paperLight, borderTop:`2px double ${C.rule}`, padding:"10px 14px 10px" }}>
      <div style={{ display:"flex", gap:4, marginBottom:8 }}>
        {MODES.map(mo => {
          const active = mode === mo.id;
          return (
            <button key={mo.id} onClick={() => setMode(mo.id)} style={{
              fontFamily:F.ui, fontSize:7, fontWeight:700, letterSpacing:2, textTransform:"uppercase",
              padding:"3px 10px", border:`1px solid ${active?mo.color:C.rule}`,
              background:active?mo.color:"transparent", color:active?C.paper:(mo.id==="normal"?C.muted:mo.color),
              cursor:"pointer", transition:"all 0.15s",
            }}>{mo.label}</button>
          );
        })}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ flex:1, position:"relative" }}>
          <div style={{ position:"absolute", top:0, right:0, width:9, height:9, background:C.paperAged, clipPath:"polygon(0 0,100% 0,100% 100%)", zIndex:1 }}/>
          <textarea
            value={text} onChange={e => setText(e.target.value)} rows={2}
            onKeyDown={e => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
            placeholder={m.ph}
            style={{ width:"100%", border:`1.5px solid ${mode!=="normal"?m.color:C.rule}`, background:C.paperDark, padding:"9px 12px", fontFamily:F.body, fontStyle:"italic", fontSize:12, color:C.ink, outline:"none", resize:"none", lineHeight:1.5 }}
          />

            <div style={{ position:"absolute", inset:0, background:"repeating-linear-gradient(90deg,transparent,transparent 14px,rgba(26,18,8,0.2) 14px,rgba(26,18,8,0.2) 15px)" }}/>
          </div>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:5 }}>
          <div style={{ fontFamily:F.body, fontStyle:"italic", fontSize:8, color:C.muted }}>Next: Archivist · 1,160 INK away</div>
          <div style={{ fontFamily:F.ui, fontSize:7, fontWeight:700, color:C.gold }}>{pct}%</div>
        </div>
      </div>

      {/* Ink balance */}
      <div style={{ display:"flex", alignItems:"center", gap:10, background:C.ink, padding:"10px 16px", border:`1.5px solid rgba(201,162,39,0.35)`, marginBottom:16, animation:"fup 0.4s ease 0.15s both" }}>
        <div style={{ width:28, height:28, borderRadius:"50%", background:`radial-gradient(circle at 35% 30%, #f0d060, ${C.gold} 60%, #8a6510)`, border:"1.5px solid rgba(42,31,14,0.5)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:F.blackletter, fontSize:14, color:C.ink }}>¤</div>
        <div>
          <div style={{ fontFamily:F.display, fontWeight:900, fontSize:26, color:C.gold, animation:"shim 3s ease-in-out infinite" }}>1,840</div>
          <div style={{ fontFamily:F.ui, fontSize:7, letterSpacing:3, textTransform:"uppercase", color:"rgba(245,239,224,0.3)" }}>INK BALANCE</div>
        </div>
        <div style={{ flex:1 }}/>
        <div style={{ fontFamily:F.body, fontStyle:"italic", fontSize:10, color:C.muted, textAlign:"right" }}>"The Owlery's<br/>reserve."</div>
      </div>

      <OrnateRule symbol="✦ 化身收藏 ✦"/>
      <SectionLabel>化身收藏 · Avatar Collection</SectionLabel>
      <div style={{ display:"flex", gap:14, flexWrap:"wrap", justifyContent:"center", marginBottom:18 }}>
        {AVATARS.map((av,i) => (
          <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, animation:`fup 0.4s ease ${0.2+i*0.07}s both`, opacity:av.owned?1:0.35 }}>
            <div style={{ width:58, height:58, borderRadius:"50%", border:`2px ${av.owned?"solid":"dashed"} ${av.owned?C.ink:C.paperAged}`, background:av.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:26 }}>
              {av.badge}
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontFamily:F.chinese, fontSize:10, fontWeight:700, color:C.ink }}>{av.name}</div>
              <div style={{ fontFamily:F.ui, fontSize:7, color:C.muted, letterSpacing:1 }}>{av.level}</div>
            </div>
          </div>
        ))}
      </div>

      <OrnateRule symbol="— ✦ —"/>
      <SectionLabel>等级之路 · Rank Progression</SectionLabel>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:18 }}>
        {RANKS.map((r,i) => (
          <div key={i} style={{ fontFamily:F.display, fontWeight:700, fontStyle:"italic", fontSize:9, padding:"4px 12px", border:`1px solid ${i===3?C.gold:i<3?C.ink:C.paperAged}`, background:i===3?C.gold:i<3?C.ink:"transparent", color:i===3?C.ink:i<3?C.paper:C.paperAged, opacity:i<=3?1:0.45 }}>
            {r}{i===3?" ✦":""}
          </div>
        ))}
      </div>

      {/* Stats */}
      <OrnateRule/>
      <div style={{ display:"flex", gap:10, marginBottom:18 }}>
        {[{label:"已提问",value:"47",sub:"Questions"},{label:"已阅读",value:"128",sub:"Articles"},{label:"连续天数",value:"14",sub:"Day Streak"}].map((s,i) => (
          <div key={i} style={{ flex:1, background:C.ink, padding:"12px 8px", textAlign:"center", animation:`fup 0.4s ease ${0.3+i*0.08}s both` }}>
            <div style={{ fontFamily:F.display, fontWeight:900, fontSize:24, color:C.paper }}>{s.value}</div>
            <div style={{ fontFamily:F.chinese, fontSize:9, color:C.muted, marginTop:2 }}>{s.label}</div>
            <div style={{ fontFamily:F.ui, fontSize:7, color:"rgba(245,239,224,0.25)", letterSpacing:1 }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Settings rows */}
      <OrnateRule symbol="— ⚙ —"/>
      <SectionLabel>设置 · Settings</SectionLabel>
      {[
        { icon:"🔔", label:"通知设置", sub:"Notification preferences", val:"" },
        { icon:"🌙", label:"深色模式", sub:"Dark mode", val:"关闭" },
        { icon:"📧", label:"每日快讯", sub:"Daily dispatch email", val:"开启" },
        { icon:"🔒", label:"隐私设置", sub:"Privacy & data", val:"" },
        { icon:"🦉", label:"关于猫头鹰邮局", sub:"About The Owlery Press", val:"" },
      ].map((s,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 0", borderBottom:`1px solid ${C.paperAged}` }}>
          <div style={{ fontSize:16, width:20, textAlign:"center", flexShrink:0 }}>{s.icon}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:F.chinese, fontSize:12, color:C.ink }}>{s.label}</div>
            <div style={{ fontFamily:F.body, fontStyle:"italic", fontSize:9, color:C.muted, marginTop:1 }}>{s.sub}</div>
          </div>
          <div style={{ fontFamily:F.ui, fontSize:7, color:C.muted, letterSpacing:1 }}>{s.val||"→"}</div>
        </div>
      ))}

      <div style={{ textAlign:"center", padding:"28px 0 8px" }}>
        <div style={{ fontFamily:F.body, fontStyle:"italic", fontSize:10, color:C.muted, opacity:0.32, lineHeight:1.8 }}>
          "The owl flies at midnight. Your story continues."<br/>— The Owlery Press · Est. 2025
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// NAVIGATION BAR
// ═══════════════════════════════════════════════════════════════
const NavBar = ({ page, setPage }) => {
  const items = [
    { id:"home",    label:"首页",  Icon:NavIconHome },
    { id:"reading", label:"阅读",  Icon:NavIconReading },
    { id:"profile", label:"我的",  Icon:NavIconProfile },
  ];
  return (
    <div style={{ flexShrink:0, background:C.ink, borderTop:`2px solid ${C.gold}`, padding:"8px 0 22px", display:"flex", justifyContent:"space-around", alignItems:"flex-start", zIndex:60 }}>
      {items.map(({ id, label, Icon }) => {
        const active = page === id;
        return (
          <div key={id} onClick={() => setPage(id)} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, cursor:"pointer", padding:"4px 20px", position:"relative", userSelect:"none" }}>
            {active && <div style={{ position:"absolute", top:-8, left:"50%", transform:"translateX(-50%)", width:28, height:2, background:C.gold }}/>}
            <div style={{ width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}><Icon active={active}/></div>
            <div style={{ fontFamily:F.ui, fontSize:7, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:active?C.gold:C.muted }}>{label}</div>
          </div>
        );
      })}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════
function DulemeApp() {
  const [page, setPage] = useState("home");
  const [dispatch, setDispatch] = useState(null);
  const [toast, setToast] = useState(null);
  const scrollRef = useRef(null);

  const openDispatch = useCallback(q => setDispatch(q), []);

  const closeDispatch = useCallback(() => {
    setDispatch(null);
    setToast({ amount:40, message:'"已阅读神谕特刊，墨水奖励已发放。"' });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const handleSend = useCallback((text, mode) => {
    setDispatch({
      zh: text, en: text,
      tag: mode==="air"?"✦ Air 快答":mode==="max"?"◈ Max 深度特刊":"🔮 神谕回应",
      color: mode==="air"?"teal":mode==="max"?"purple":"gold",
      votes:"New", type:"Your Question",
    });
  }, []);

  const navigate = useCallback(p => {
    setPage(p);
    setDispatch(null);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, []);

  const edition = page==="home"?"Oracle Edition":page==="reading"?"Reading Room":"Scholar's Record";

  return (
    <div className="dlm" style={{
      width:"100%", maxWidth:390, margin:"0 auto",
      height:"100vh", maxHeight:844,
      display:"flex", flexDirection:"column",
      position:"relative", overflow:"hidden",
      border: window.innerWidth>400?`1px solid rgba(42,31,14,0.15)`:"none",
      boxShadow: window.innerWidth>400?"0 0 60px rgba(42,31,14,0.25)":"none",
    }}>

      <Masthead edition={edition}/>

      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", position:"relative", ...TEX.paper }}>
        <div style={{ position:"absolute", inset:0, pointerEvents:"none", background:"radial-gradient(ellipse at center,transparent 55%,rgba(42,31,14,0.15) 100%)", zIndex:1 }}/>
        <div style={{ position:"relative", zIndex:2 }}>
          {page==="home"    && <HomeScreen onOpenDispatch={openDispatch}/>}
          {page==="reading" && <ReadingScreen/>}
          {page==="profile" && <ProfileScreen/>}
        </div>
        {dispatch && <OracleDispatch question={dispatch} onClose={closeDispatch}/>}
        <InkToast amount={toast?.amount||0} message={toast?.message||""} visible={!!toast}/>
      </div>

      {page==="home" && !dispatch && (
        <div style={{ flexShrink:0, zIndex:40 }}>
          <InputBar onSend={handleSend}/>
        </div>
      )}

      <NavBar page={page} setPage={navigate}/>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DulemeApp/>);

// Hide splash
const splash = document.getElementById("splash");
if (splash) { splash.style.opacity = "0"; setTimeout(() => splash.remove(), 600); }
</script>
</body>
</html>
